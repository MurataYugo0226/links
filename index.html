<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>開発研究生｜のじ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0d0d0d;
      color: #ffffff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 4px;
    }

    .name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .bio {
      font-size: 13px;
      color: #9ca3af;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      border-radius: 12px;
      background-color: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #ffffff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .link-btn:hover {
      background-color: #222222;
      border-color: #3b82f6;
      transform: translateY(-1px);
    }

    .link-btn.disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .icon-x       { background-color: #000000; border: 1px solid #333; }
    .icon-note    { background-color: #41c9b4; }
    .icon-line    { background-color: #06c755; }
    .icon-port    { background-color: #3b82f6; }

    .link-text { flex: 1; }
    .link-label { font-size: 15px; font-weight: 600; }
    .link-sub   { font-size: 11px; color: #6b7280; margin-top: 1px; }

    .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      background-color: #1e3a5f;
      color: #60a5fa;
      font-weight: 600;
    }

    .footer {
      margin-top: 8px;
      font-size: 11px;
      color: #4b5563;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="avatar" style="background:none; padding:0; overflow:hidden;">
      <img src="avatar.png" alt="のじ" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">
    </div>

    <div class="name">開発研究生｜のじ</div>

    <div class="bio">
      AIで個人開発してる大学生<br>
      作る過程・詰まり・売上まで全部オープンに発信🔓<br>
      HP/LP・業務効率化ツールの相談はDMへ📩
    </div>

    <div class="links">

      <a class="link-btn" href="https://x.com/kaihatsu_lab" target="_blank">
        <div class="icon icon-x">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.261 5.636 5.903-5.636zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
        </div>
        <div class="link-text">
          <div class="link-label">X（旧Twitter）</div>
          <div class="link-sub">@kaihatsu_lab｜開発リアルタイム発信</div>
        </div>
      </a>

      <a class="link-btn" href="https://note.com/yugo_ai" target="_blank">
        <div class="icon icon-note">📝</div>
        <div class="link-text">
          <div class="link-label">note</div>
          <div class="link-sub">開発の学び・ノウハウを発信</div>
        </div>
      </a>

      <a class="link-btn" href="https://www.instagram.com/kaihatsu_lab" target="_blank">
        <div class="icon" style="background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
          </svg>
        </div>
        <div class="link-text">
          <div class="link-label">Instagram</div>
          <div class="link-sub">@kaihatsu_lab｜AI活用術を図解で発信</div>
        </div>
      </a>

      <div class="link-btn disabled">
        <div class="icon icon-line">💬</div>
        <div class="link-text">
          <div class="link-label">LINE公式アカウント</div>
          <div class="link-sub">仕事の相談・お知らせ</div>
        </div>
        <span class="badge">準備中</span>
      </div>

      <div class="link-btn disabled">
        <div class="icon icon-port">🗂️</div>
        <div class="link-text">
          <div class="link-label">Portfolio</div>
          <div class="link-sub">開発実績・HP/LP制作事例</div>
        </div>
        <span class="badge">準備中</span>
      </div>

    </div>

    <div class="footer">© 2026 のじ｜開発研究生</div>

  </div>
</body>
</html>
